name: "📡 Request New Feed"
description: "Request an RSS feed for a blog that doesn't have one"
labels: ["new-feed"]
body:
  - type: markdown
    attributes:
      value: |
        Just paste the blog URL below and we'll handle the rest!
        Our AI will analyze the page structure and generate an RSS feed automatically.

  - type: input
    id: url
    attributes:
      label: Blog URL
      description: "The URL of the blog index page (e.g. https://example.com/blog)"
      placeholder: "https://example.com/blog"
    validations:
      required: true
