name: Update Feeds

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run src/run-all.ts
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update feeds"
          file_pattern: "feeds/*.xml cache/*.json"
