name: Update Feeds

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run src/run-all.ts
      - run: bun run readme
      - name: Commit changes
        run: |
          git config --global user.name "ai-rss-feeds[bot]"
          git config --global user.email "ai-rss-feeds[bot]@users.noreply.github.com"
          git add feeds/ README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update feeds"
            git push
          fi
